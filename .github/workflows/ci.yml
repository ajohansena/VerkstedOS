name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Module boundaries (dependency-cruiser)
        run: pnpm depcruise

      - name: Permission catalog drift check
        run: pnpm check:permissions

      - name: Metric registry coverage check
        run: pnpm check:metrics

      - name: Route inventory (no broken /dev hrefs)
        run: pnpm check:routes

      - name: Unit tests
        run: pnpm test

      - name: Tenant isolation & integration tests
        # Spins real Postgres via Testcontainers (Docker is available on
        # ubuntu-latest runners). This is the merge-gating bedrock suite.
        run: pnpm test:integration

      - name: Build
        run: pnpm build
